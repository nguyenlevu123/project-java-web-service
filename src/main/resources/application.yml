spring:
  application:
    name: worksphere-job-portal-restful-api

  datasource:
    url: jdbc:mysql://localhost:3306/worksphere_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root

    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: 8080

logging:
  level:
    com.example.worksphere: INFO

app:
  jwt:
    secret-key: "replace-this-secret-key-with-at-least-32-characters"
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
